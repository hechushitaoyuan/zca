name: docker-build

# 链路：main push / v* tag / 手动 → E2 测试 → linux/amd64 + linux/arm64 构建
# → Docker Hub（${DOCKERHUB_USERNAME}/zca）。PR 仅测试 + 构建验证，不推镜像。
# 真实用户名与 token 仅来自仓库 Secrets，不写入本文件。

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── E2：构建前必须全绿，失败则不进入镜像构建/推送 ──────────────────────────
  test:
    name: E2 tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Compile check
        run: python -m compileall -q app tests main.py

      - name: Unit tests
        run: python -m unittest discover -s tests -v

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Solver syntax check
        run: node --check captcha_node/solver.js

  # ── 多架构构建（仅 test 通过后执行）──────────────────────────────────────────
  build:
    name: Build & publish (Docker Hub)
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # arm64 交叉构建必需：在 amd64 runner 上模拟 arm64
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # PR 不登录、不推送（仅构建验证）
      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # PR（含 fork）拿不到仓库 Secrets，用非敏感占位名保证“PR 仅构建验证”不因空镜像名失败；
          # 仅非 PR 事件使用真实 Docker Hub 用户名（不写入明文用户名/token）。
          images: ${{ github.event_name == 'pull_request' && 'local/zca' || format('{0}/zca', secrets.DOCKERHUB_USERNAME) }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ZCA_VERSION=${{ github.ref_name }}
            ZCA_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
